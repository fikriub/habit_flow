<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Habit Tracker</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #059669;
      --accent-hover: #047857;
      --accent-light: #ecfdf5;
      --success: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* Add habit form */
    .add-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      min-width: 140px;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select {
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
    }

    .btn {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--bg);
      color: var(--text);
    }

    .btn-ghost:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: none;
      padding: 0.35rem 0.5rem;
      font-size: 0.85rem;
    }

    .btn-danger:hover {
      color: var(--danger-hover);
      background: #fef2f2;
    }

    /* Week navigation */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .week-label {
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 180px;
      text-align: center;
      color: var(--text);
    }

    /* Habit list */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    .grid-header {
      display: grid;
      grid-template-columns: 1fr repeat(7, 36px);
      gap: 0.5rem;
      align-items: center;
      padding: 0 0 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .grid-header .day-label {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .grid-header .spacer {
      /* habit name column */
    }

    .habit-row {
      display: grid;
      grid-template-columns: 1fr repeat(7, 36px);
      gap: 0.5rem;
      align-items: center;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }

    .habit-row:last-child {
      border-bottom: none;
    }

    .habit-info {
      min-width: 0;
    }

    .habit-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .habit-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .badge {
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.72rem;
    }

    .streak {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-weight: 500;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .progress-bar {
      width: 48px;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.2s;
    }

    .day-cell {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      margin: 0 auto;
    }

    .day-cell:hover:not(.disabled):not(.completed) {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .day-cell.completed {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .day-cell.today {
      box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.35);
    }

    .day-cell.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: var(--bg);
    }

    .day-cell:active:not(.disabled) {
      transform: scale(0.92);
    }

    .delete-btn {
      margin-left: auto;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .grid-header,
      .habit-row {
        grid-template-columns: 1fr repeat(7, 32px);
        gap: 0.35rem;
      }

      .day-cell {
        width: 32px;
        height: 32px;
        font-size: 0.75rem;
      }

      .add-form {
        flex-direction: column;
        align-items: stretch;
      }

      .week-label {
        min-width: 140px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Personal Habit Tracker</h1>
      <p>Track your habits, build streaks, reach your weekly goals.</p>
    </header>

    <div class="card">
      <div class="card-title">Add a Habit</div>
      <form class="add-form" id="addForm">
        <div class="form-group">
          <label for="habitName">Habit name</label>
          <input type="text" id="habitName" placeholder="e.g. Exercise" maxlength="60" required>
        </div>
        <div class="form-group" style="flex: 0 0 160px;">
          <label for="habitTarget">Target per week</label>
          <select id="habitTarget">
            <option value="1">1× / week</option>
            <option value="2">2× / week</option>
            <option value="3">3× / week</option>
            <option value="4">4× / week</option>
            <option value="5">5× / week</option>
            <option value="6">6× / week</option>
            <option value="7" selected>7× / week (daily)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Habit</button>
      </form>
    </div>

    <div class="card">
      <div class="week-nav">
        <button class="btn btn-ghost" id="prevWeek" aria-label="Previous week">← Prev</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="btn btn-ghost" id="nextWeek" aria-label="Next week">Next →</button>
      </div>
      <div id="habitList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'habitTracker';
    const DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    let state = { habits: [] };
    let weekOffset = 0;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && Array.isArray(parsed.habits)) {
            state = parsed;
            return;
          }
        }
      } catch {
        /* corrupt data — reset below */
      }
      state = { habits: [] };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function generateId() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseDateISO(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function getWeekDates(offset) {
      const today = startOfDay(new Date());
      const dayOfWeek = today.getDay();
      const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
      const monday = new Date(today);
      monday.setDate(today.getDate() + mondayOffset + offset * 7);

      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    function formatWeekLabel(dates) {
      const start = dates[0];
      const end = dates[6];
      const opts = { month: 'short', day: 'numeric' };
      const startStr = start.toLocaleDateString(undefined, opts);
      const endStr = end.toLocaleDateString(undefined, { ...opts, year: 'numeric' });
      return `${startStr} – ${endStr}`;
    }

    function isFuture(date) {
      return startOfDay(date) > startOfDay(new Date());
    }

    function isToday(date) {
      return formatDateISO(date) === formatDateISO(new Date());
    }

    function getDayStreak(habit) {
      const today = startOfDay(new Date());
      let checkDate = new Date(today);

      if (!habit.completions[formatDateISO(today)]) {
        checkDate.setDate(checkDate.getDate() - 1);
      }

      let streak = 0;
      while (habit.completions[formatDateISO(checkDate)]) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      }
      return streak;
    }

    function getWeekProgress(habit, weekDates) {
      let count = 0;
      for (const date of weekDates) {
        if (habit.completions[formatDateISO(date)]) count++;
      }
      return count;
    }

    function addHabit(name, target) {
      state.habits.push({
        id: generateId(),
        name: name.trim(),
        targetPerWeek: target,
        completions: {}
      });
      saveState();
      render();
    }

    function deleteHabit(id) {
      state.habits = state.habits.filter(h => h.id !== id);
      saveState();
      render();
    }

    function toggleCompletion(habitId, dateISO) {
      const habit = state.habits.find(h => h.id === habitId);
      if (!habit) return;

      if (habit.completions[dateISO]) {
        delete habit.completions[dateISO];
      } else {
        habit.completions[dateISO] = true;
      }
      saveState();
      render();
    }

    function render() {
      const weekDates = getWeekDates(weekOffset);
      const weekLabel = document.getElementById('weekLabel');
      const habitList = document.getElementById('habitList');
      const nextWeekBtn = document.getElementById('nextWeek');

      weekLabel.textContent = weekOffset === 0
        ? `This Week · ${formatWeekLabel(weekDates)}`
        : formatWeekLabel(weekDates);

      nextWeekBtn.disabled = weekOffset >= 0;

      if (state.habits.length === 0) {
        habitList.innerHTML = `
          <div class="empty-state">
            <p>No habits yet. Add your first habit above to get started!</p>
          </div>`;
        return;
      }

      let html = `
        <div class="grid-header">
          <div class="spacer"></div>
          ${DAY_LABELS.map(d => `<div class="day-label">${d}</div>`).join('')}
        </div>`;

      for (const habit of state.habits) {
        const streak = getDayStreak(habit);
        const weekCount = getWeekProgress(habit, weekDates);
        const progressPct = Math.min(100, (weekCount / habit.targetPerWeek) * 100);

        html += `<div class="habit-row" data-id="${habit.id}">`;
        html += `<div class="habit-info">`;
        html += `<div class="habit-name">`;
        html += `<span>${escapeHtml(habit.name)}</span>`;
        html += `<button class="btn btn-danger delete-btn" data-delete="${habit.id}" title="Delete habit">✕</button>`;
        html += `</div>`;
        html += `<div class="habit-meta">`;
        html += `<span class="badge">${habit.targetPerWeek}×/week</span>`;
        html += `<span class="progress-wrap">`;
        html += `<span>${weekCount}/${habit.targetPerWeek}</span>`;
        html += `<span class="progress-bar"><span class="progress-fill" style="width:${progressPct}%"></span></span>`;
        html += `</span>`;
        html += `<span class="streak">🔥 ${streak} day${streak !== 1 ? 's' : ''}</span>`;
        html += `</div>`;
        html += `</div>`;

        for (const date of weekDates) {
          const iso = formatDateISO(date);
          const completed = !!habit.completions[iso];
          const future = isFuture(date);
          const today = isToday(date);
          let cls = 'day-cell';
          if (completed) cls += ' completed';
          if (today) cls += ' today';
          if (future) cls += ' disabled';

          html += `<button class="${cls}" data-habit="${habit.id}" data-date="${iso}" ${future ? 'disabled' : ''} aria-label="${iso}${completed ? ' completed' : ''}">`;
          html += completed ? '✓' : '';
          html += `</button>`;
        }

        html += `</div>`;
      }

      habitList.innerHTML = html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('addForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameInput = document.getElementById('habitName');
      const targetInput = document.getElementById('habitTarget');
      const name = nameInput.value.trim();
      const target = parseInt(targetInput.value, 10);

      if (!name || target < 1 || target > 7) return;

      addHabit(name, target);
      nameInput.value = '';
      targetInput.value = '7';
      nameInput.focus();
    });

    document.getElementById('prevWeek').addEventListener('click', () => {
      weekOffset--;
      render();
    });

    document.getElementById('nextWeek').addEventListener('click', () => {
      if (weekOffset < 0) {
        weekOffset++;
        render();
      }
    });

    document.getElementById('habitList').addEventListener('click', (e) => {
      const deleteBtn = e.target.closest('[data-delete]');
      if (deleteBtn) {
        deleteHabit(deleteBtn.dataset.delete);
        return;
      }

      const cell = e.target.closest('.day-cell:not(.disabled)');
      if (cell) {
        toggleCompletion(cell.dataset.habit, cell.dataset.date);
      }
    });

    loadState();
    render();
  </script>
</body>
</html>
